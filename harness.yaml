# harness.yaml — precedence manifest: one owner per lifecycle phase.
# The dual-runtime linter treats this file as canon. Changes land by PR only.
version: 1

# When guidance conflicts, earlier wins.
precedence:
  - constitution
  - factory-gates
  - gstack
  - other-skills

phases:
  discovery: # 0a
    owner: "gstack:/office-hours"
    notes: "Lightweight on purpose: no .factory ceremony before sign-off."
  prototype: # 0b
    owner: "prototype-skill"
    allowed:
      - "ponytail:lite"
    notes: >-
      Proof for client sign-off; may take weeks — no gate is time-driven.
      After sign-off the outcome is PRESERVED under prototype/ (code,
      screenshots, walkthrough notes) as the UX reference for future UI/UX
      changes. Reference forever, imported never: production code must not
      depend on anything in prototype/.
  planning:
    owner: "claude-code:plan-mode"
    alternate: "codex:planner-high"
    exploration: "codex:read-only"
    contract: ".agents/prompts/planner.md"
    plan_artifact: "plans/active/<issue>-<slug>.md via forge.py plan save"
    decisions: "docs/decisions/ records BEFORE decomposition is recorded"
    notes: >-
      Claude Code plan mode is the default planner; the planner-high Codex
      agent is the sanctioned alternative when a dev prefers it. Either way
      the contract is identical: same sections (incl. Decisions), same
      forge.py plan save step, same gates. When planning in Claude, delegate
      ALL codebase exploration to Codex read-only runs (/codex:rescue or
      `codex exec -s read-only`). Approval is the saved plan file, not a flag.
  implementation:
    owner: "codex:/codex:rescue"
    prompts: ".agents/prompts/implementer.md"
  testing:
    owner: "codex-subagents:automated-tester,functional-checker"
  review:
    owner: "codex-subagents:quality,performance,security"
    escalation:
      tool: "openclaw:autoreview"
      when: "security-sensitive|migration|cross-domain"
      at: "pr-ready"
    notes: "Never both review loops on one task (never nest reviewers)."
  ship:
    owner: ".agents/scripts/pr_ready.py"
    merge: manual

disabled_in_factory_repos:
  - "gstack:/codex"
  - "gstack:/ship"
  - "codex-plugin-cc:stop-hook-review-gate"

not_installed_v1:
  - "mattpocock/skills"
