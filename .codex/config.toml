# Implementation default (what /codex:rescue runs): the fast GPT-5.6 tier at
# deep effort — bounded tasks with approved plans are exactly Luna's shape,
# xhigh buys the reasoning back. Agents under .codex/agents/ override per-role.
model = "gpt-5.6-luna"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "high"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
web_search = "cached"

[features]
codex_hooks = true
multi_agent = true
streamable_shell = true
skills = true

[agents]
max_threads = 6
max_depth = 1

[projects."/workspace"]
trust_level = "trusted"
