name: harness-health

# Calendar-cadence leg of the loop-health doctrine (WORKFLOW.md "Loop Health"):
# session-start and ship cadence miss idle repos — exactly the window where
# deferrals go stale and the vendored harness falls behind. Automation only
# DETECTS and PROPOSES here; merging the upgrade PR and accepting decisions
# stay human ("nothing self-activates").

on:
  schedule:
    - cron: '30 3 * * *' # daily, after the gardener
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Loop-health audit + gate integrity
        id: health
        run: |
          set +e
          AUDIT_OUT=$(python3 .agents/scripts/forge.py audit 2>&1)
          AUDIT_N=$(printf '%s\n' "$AUDIT_OUT" | grep -c '^- ')
          DRIFT_OUT=$(python3 .agents/scripts/check_vendor_integrity.py 2>&1)
          DRIFT_RC=$?
          set -e
          echo "audit_n=${AUDIT_N:-0}" >> "$GITHUB_OUTPUT"
          echo "drift_rc=$DRIFT_RC" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<REPORT_EOF'
            printf '%s\n\n%s\n' "$AUDIT_OUT" "$DRIFT_OUT"
            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Check whether the vendored harness is behind
        id: staleness
        env:
          HARNESS_READ_TOKEN: ${{ secrets.HARNESS_READ_TOKEN }}
        run: |
          # Degrades gracefully: no VENDORED_FROM means this repo IS the
          # harness (or a pre-manifest vendoring); no token means the harness
          # repo is unreachable from this repo's CI — audit-only mode.
          BEHIND=0
          if [ -f constitution/VENDORED_FROM ] && [ -n "$HARNESS_READ_TOKEN" ]; then
            VENDORED=$(head -1 constitution/VENDORED_FROM | awk '{print $3}')
            git clone --quiet --depth 1 \
              "https://x-access-token:${HARNESS_READ_TOKEN}@github.com/knacklabs/symphony-forge.git" \
              "$RUNNER_TEMP/harness" || true
            if [ -d "$RUNNER_TEMP/harness/.git" ]; then
              UPSTREAM=$(git -C "$RUNNER_TEMP/harness" rev-parse HEAD)
              if [ -n "$VENDORED" ] && [ "$UPSTREAM" != "$VENDORED" ]; then
                BEHIND=1
              fi
            fi
          fi
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
      - name: Propose the upgrade — automation proposes, humans merge
        if: steps.staleness.outputs.behind == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "harness-health[bot]"
          git config user.email "harness-health-bot@users.noreply.github.com"
          git checkout -B chore/harness-upgrade
          # forge upgrade runs FROM the harness clone TARGETING this repo,
          # and re-freezes VENDOR_MANIFEST.json as part of the vendoring.
          (cd "$RUNNER_TEMP/harness" \
            && python3 .agents/scripts/forge.py upgrade --target "$GITHUB_WORKSPACE")
          git add -A
          git commit -m "chore: harness upgrade (automated proposal from harness-health)"
          git push -f origin chore/harness-upgrade
          EXISTING=$(gh pr list --head chore/harness-upgrade --state open --json number --jq '.[0].number' || true)
          if [ -z "$EXISTING" ]; then
            gh pr create --title "chore: harness upgrade (automated proposal)" --body \
          "The vendored harness is behind knacklabs/symphony-forge. This PR is \`forge upgrade\` run by the daily harness-health workflow — machinery only, project-owned content untouched, gate manifest re-frozen.

          Review it like any harness upgrade: \`git diff\`, then linters + gate tests run in CI. Merging is the human step — the workflow never merges (frozen-gate doctrine, decision 0009)."
          fi
      - name: Open or update the harness-health issue
        if: steps.health.outputs.audit_n != '0' || steps.health.outputs.drift_rc != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.health.outputs.report }}
        run: |
          TITLE="Harness health: the improvement loops need attention"
          BODY="Daily harness-health report:

          \`\`\`
          $REPORT
          \`\`\`

          These are routed, not silenced: consolidate recurring classes (refactor story + decision), resolve or re-trigger deferrals, retarget dead lessons — the /forge skill routes it. Gate-surface drift blocks the next ship until re-vendored or upstreamed. This issue closes on the next clean run."
          EXISTING=$(gh issue list --state open --search "in:title Harness health:" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label maintenance || gh issue create --title "$TITLE" --body "$BODY"
          fi
      - name: Close the harness-health issue when clean
        if: steps.health.outputs.audit_n == '0' && steps.health.outputs.drift_rc == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --state open --search "in:title Harness health:" --json number --jq '.[0].number' || true)
          [ -n "$EXISTING" ] && gh issue close "$EXISTING" --comment "Harness health: loops clean, gates intact. Closing." || true
