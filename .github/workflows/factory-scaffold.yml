name: factory-scaffold

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check scaffold files
        run: python3 .agents/scripts/check_factory_scaffold.py
      - name: Check AGENTS hygiene
        run: python3 .agents/scripts/check_agents_hygiene.py
      - name: Check dual runtime
        run: python3 .agents/scripts/check_dual_runtime.py
      - name: Check context ledger freshness
        run: python3 .agents/scripts/forge.py context scan --check
      - name: Compile factory scripts
        run: python3 -m compileall .agents/scripts
      - name: Smoke test forge init
        run: |
          python3 .agents/scripts/forge.py init --name smoke --target "$RUNNER_TEMP/forge-smoke"
          python3 .agents/scripts/check_dual_runtime.py "$RUNNER_TEMP/forge-smoke"
          python3 .agents/scripts/check_factory_scaffold.py "$RUNNER_TEMP/forge-smoke"
